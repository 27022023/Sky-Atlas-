<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Travel Planner</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#e9e4ff,#cfe7ff,#ffe6f2);font-size:5vw;}
*{box-sizing:border-box;}
.page{max-width:900px;margin:0 auto;padding:6vw;}
.home-btn{position:fixed;top:3vw;left:3vw;background:#ffe6f2;border-radius:50%;width:14vw;height:14vw;display:flex;justify-content:center;align-items:center;font-size:8vw;border:.8vw solid #f3cde5;cursor:pointer;z-index:999;box-shadow:0 4px 8px rgba(0,0,0,.2);}
h1{margin-top:22vw;font-size:12vw;text-align:center;color:#4b3f72;font-weight:bold;}
.section{background:#ffffffcc;border-radius:5vw;padding:5vw;margin-top:6vw;box-shadow:0 3px 8px rgba(0,0,0,.08);}
.section-title{font-size:7vw;font-weight:bold;margin-bottom:4vw;color:#4b3f72;}
label{display:block;font-size:5vw;margin:3vw 0 1vw;color:#4b3f72;}
input,select,textarea{width:100%;padding:4vw;border-radius:4vw;border:1px solid #ccc;font-size:5vw;margin-bottom:4vw;}
textarea{min-height:20vw;}
.info-row{display:flex;gap:4vw;flex-wrap:wrap;}
.info-row>div{flex:1 1 40vw;}
.badge{display:inline-block;background:#e4ddff;color:#4b3f72;padding:3vw 5vw;border-radius:999px;font-size:5vw;margin-top:3vw;}
.reminder-banner{margin-top:4vw;padding:4vw;border-radius:4vw;background:#ffeaf4;color:#5b2340;font-size:5vw;display:none;}
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4vw;}
.calendar-header button{background:#d9c8ff;border:none;border-radius:999px;padding:3vw 5vw;font-size:7vw;color:#3f326b;cursor:pointer;}
.calendar-header span{font-size:7vw;font-weight:bold;color:#3f326b;}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2vw;font-size:5vw;}
.calendar-day-name{text-align:center;font-weight:bold;color:#4b3f72;}
.calendar-cell{background:#f7f4ff;border-radius:4vw;height:14vw;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.calendar-cell.disabled{opacity:.3;cursor:default;}
.calendar-cell span{font-size:6vw;color:#4b3f72;}
.calendar-dot{width:2vw;height:2vw;border-radius:50%;background:#ff8fb8;position:absolute;bottom:1.5vw;}
#dayPopup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);display:none;justify-content:center;align-items:center;z-index:1000;}
.popup-inner{background:#fdf3ff;border-radius:5vw;padding:5vw;width:85%;max-width:450px;box-shadow:0 4px 10px rgba(0,0,0,.2);}
.popup-title{font-size:7vw;font-weight:bold;color:#4b3f72;margin-bottom:3vw;}
.popup-date{font-size:5vw;color:#6a5a9b;margin-bottom:4vw;}
.popup-inner textarea{border-radius:4vw;border:1px solid #d9c8ff;font-size:5vw;padding:4vw;}
.popup-buttons{display:flex;gap:3vw;margin-top:4vw;}
.popup-buttons button{flex:1;padding:4vw;border-radius:999px;border:none;font-size:5vw;cursor:pointer;}
.popup-save{background:#c9e7ff;color:#23405f;}
.popup-delete{background:#ffd1e3;color:#5b2340;}
.popup-cancel{background:#e4ddff;color:#3f326b;}
.list-input-row{display:flex;gap:3vw;margin-top:3vw;}
.list-input-row input{flex:1;}
.list-input-row button{padding:3vw 4vw;border-radius:4vw;border:none;background:#c9e7ff;font-size:7vw;color:#23405f;cursor:pointer;}
ul{list-style:none;margin-top:4vw;padding:0;}
li{display:flex;align-items:center;justify-content:space-between;background:#f7f4ff;border-radius:4vw;padding:4vw;margin-bottom:3vw;font-size:5vw;}
li span{flex:1;margin-right:4vw;}
li input[type=checkbox]{transform:scale(2);margin-left:4vw;}
li button{border:none;background:#ffd1e3;border-radius:999px;padding:2vw 3vw;font-size:5vw;color:#5b2340;margin-left:3vw;cursor:pointer;}
</style></head>

<body>
<div class="home-btn" onclick="location.href='index.html'">🏠</div>

<div class="page">
<h1>Travel Planner</h1>

<div class="section">
<div class="section-title">Trip Details</div>
<div class="info-row">
<div><label>Trip name</label><input id="tripName"></div>
<div><label>Destination</label><input id="tripDestination"></div>
</div>
<div class="info-row">
<div><label>Start date</label><input id="tripStart" type="date"></div>
<div><label>End date</label><input id="tripEnd" type="date"></div>
</div>
<div class="info-row">
<div><label>Transport</label>
<select id="tripTransport"><option value="">Choose...</option><option>Plane ✈️</option><option>Train 🚆</option><option>Car 🚗</option><option>Bus 🚌</option><option>Boat ⛴️</option></select></div>
<div><label>Stay length</label><input id="tripLength"></div>
</div>
<span class="badge" id="tripDurationBadge">Duration: –</span>
<div class="reminder-banner" id="reminderBanner">🌸 ✈️ Your trip starts tomorrow!</div>
</div>

<div class="section">
<div class="section-title">Calendar</div>
<div class="calendar-header">
<button onclick="changeMonth(-1)">◀</button>
<span id="calMonthLabel"></span>
<button onclick="changeMonth(1)">▶</button>
</div>
<div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="section">
<div class="section-title">Packing Checklist</div>
<div class="list-input-row"><input id="packInput"><button onclick="addPackItem()">＋</button></div>
<ul id="packList"></ul>
</div>

<div class="section">
<div class="section-title">Things To Do</div>
<div class="list-input-row"><input id="todoInput"><button onclick="addTodoItem()">＋</button></div>
<ul id="todoList"></ul>
</div>
</div>

<div id="dayPopup">
<div class="popup-inner">
<div class="popup-title">Day Notes</div>
<div class="popup-date" id="popupDateLabel"></div>
<textarea id="popupText"></textarea>
<div class="popup-buttons">
<button class="popup-save" onclick="saveDayNote()">Save</button>
<button class="popup-delete" onclick="deleteDayNote()">Delete</button>
<button class="popup-cancel" onclick="closeDayPopup()">Cancel</button>
</div>
</div>
</div>

<script>
const STORAGE_KEY="travelPlannerData_v1";
let state={tripName:"",tripDestination:"",tripStart:"",tripEnd:"",tripTransport:"",tripLength:"",pack:[],todo:[],dayNotes:{},calYear:null,calMonth:null};
const $=id=>document.getElementById(id);
function loadState(){try{state=JSON.parse(localStorage.getItem(STORAGE_KEY))||state;}catch{}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}

/* TRIP INPUTS */
function initInputs(){
["tripName","tripDestination","tripStart","tripEnd","tripTransport","tripLength"].forEach(id=>$(id).value=state[id]);
$("tripName").oninput=e=>{state.tripName=e.target.value;saveState();};
$("tripDestination").oninput=e=>{state.tripDestination=e.target.value;saveState();};
$("tripStart").oninput=e=>{state.tripStart=e.target.value;updateDuration();checkReminder();saveState();};
$("tripEnd").oninput=e=>{state.tripEnd=e.target.value;updateDuration();saveState();};
$("tripTransport").oninput=e=>{state.tripTransport=e.target.value;saveState();};
$("tripLength").oninput=e=>{state.tripLength=e.target.value;saveState();};
updateDuration();
}
function updateDuration(){
const s=state.tripStart,e=state.tripEnd,b=$("tripDurationBadge");
if(!s||!e)return b.textContent="Duration: –";
const sd=new Date(s),ed=new Date(e);
if(ed<sd)return b.textContent="Duration: –";
b.textContent="Duration: "+(Math.round((ed-sd)/86400000)+1)+" days";
}
function checkReminder(){
const b=$("reminderBanner");b.style.display="none";
if(!state.tripStart)return;
const diff=(new Date(state.tripStart).setHours(0,0,0,0)-new Date().setHours(0,0,0,0))/86400000;
if(diff===1)b.style.display="block";
}

/* EDITABLE LIST ITEMS */
function editItem(span,item,list){
const input=document.createElement("input");
input.value=item.text;input.style.fontSize="5vw";
span.replaceWith(input);input.focus();
const finish=()=>{item.text=input.value.trim()||item.text;saveState();list==="pack"?renderPack():renderTodo();};
input.onblur=finish;input.onkeydown=e=>{if(e.key==="Enter")finish()};
}

/* PACK LIST */
function renderPack(){
const ul=$("packList");ul.innerHTML="";
state.pack.forEach((item,i)=>{
const li=document.createElement("li");
const span=document.createElement("span");span.textContent=item.text;span.onclick=()=>editItem(span,item,"pack");
const cb=document.createElement("input");cb.type="checkbox";cb.checked=item.done;cb.onchange=()=>{item.done=cb.checked;saveState();};
const del=document.createElement("button");del.textContent="✕";del.onclick=()=>{state.pack.splice(i,1);saveState();renderPack();};
li.append(span,cb,del);ul.appendChild(li);
});
}
function addPackItem(){
const inp=$("packInput"),t=inp.value.trim();if(!t)return;
state.pack.push({text:t,done:false});inp.value="";saveState();renderPack();
}

/* TODO LIST */
function renderTodo(){
const ul=$("todoList");ul.innerHTML="";
state.todo.forEach((item,i)=>{
const li=document.createElement("li");
const span=document.createElement("span");span.textContent=item.text;span.onclick=()=>editItem(span,item,"todo");
const cb=document.createElement("input");cb.type="checkbox";cb.checked=item.done;cb.onchange=()=>{item.done=cb.checked;saveState();};
const del=document.createElement("button");del.textContent="✕";del.onclick=()=>{state.todo.splice(i,1);saveState();renderTodo();};
li.append(span,cb,del);ul.appendChild(li);
});
}
function addTodoItem(){
const inp=$("todoInput"),t=inp.value.trim();if(!t)return;
state.todo.push({text:t,done:false});inp.value="";saveState();renderTodo();
}

/* CALENDAR */
const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function initCalendar(){
const now=new Date();
if(state.calYear==null)state.calYear=now.getFullYear();
if(state.calMonth==null)state.calMonth=now.getMonth();
renderCalendar();
}
function changeMonth(d){
state.calMonth+=d;
if(state.calMonth<0){state.calMonth=11;state.calYear--;}
if(state.calMonth>11){state.calMonth=0;state.calYear++;}
saveState();renderCalendar();
}
function renderCalendar(){
const y=state.calYear,m=state.calMonth;
$("calMonthLabel").textContent=months[m]+" "+y;
const grid=$("calendarGrid");grid.innerHTML="";
days.forEach(d=>{const el=document.createElement("div");el.className="calendar-day-name";el.textContent=d;grid.appendChild(el);});
const first=new Date(y,m,1),start=first.getDay(),daysIn=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
for(let i=0;i<start;i++){const d=prev-start+1+i;const c=document.createElement("div");c.className="calendar-cell disabled";c.innerHTML="<span>"+d+"</span>";grid.appendChild(c);}
for(let d=1;d<=daysIn;d++){
const c=document.createElement("div");c.className="calendar-cell";c.innerHTML="<span>"+d+"</span>";
const key=formatKey(y,m,d);
if(state.dayNotes[key]){const dot=document.createElement("div");dot.className="calendar-dot";c.appendChild(dot);}
c.onclick=()=>openDayPopup(y,m,d);grid.appendChild(c);
}
const total=7+start+daysIn,rows=Math.ceil(total/7),need=rows*7-total;
for(let i=0;i<need;i++){const c=document.createElement("div");c.className="calendar-cell disabled";grid.appendChild(c);}
}
function formatKey(y,m,d){return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}

/* POPUP */
let currentKey=null;
function openDayPopup(y,m,d){
currentKey=formatKey(y,m,d);
$("popupDateLabel").textContent=currentKey;
$("popupText").value=state.dayNotes[currentKey]||"";
$("dayPopup").style.display="flex";
}
function closeDayPopup(){$("dayPopup").style.display="none";currentKey=null;}
function saveDayNote(){if(!currentKey)return;state.dayNotes[currentKey]=$("popupText").value.trim();saveState();closeDayPopup();renderCalendar();}
function deleteDayNote(){if(!currentKey)return;delete state.dayNotes[currentKey];saveState();closeDayPopup();renderCalendar();}

/* INIT */
loadState();initInputs();renderPack();renderTodo();initCalendar();checkReminder();
</script>
</body></html>
