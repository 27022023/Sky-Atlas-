<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sky Atlas — City Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins;background:linear-gradient(#c7c4ff,#e6e4ff);padding:20px;min-height:100vh}
.home{position:fixed;top:15px;left:15px;background:#e3c9ff;padding:12px;border-radius:50%;font-size:22px;cursor:pointer;z-index:99}
h1{text-align:center;margin-top:60px;font-size:46px;font-family:'Great Vibes';color:#3b2f63}
input{width:100%;padding:14px;border:none;border-radius:14px;font-size:17px;box-shadow:0 4px 12px #0002;margin:20px auto;max-width:600px;display:block}
#list{max-width:600px;margin:0 auto}
.city{width:100%;padding:14px;margin-bottom:10px;border:none;border-radius:14px;background:#dcd7ff;font-size:17px;display:flex;justify-content:space-between;cursor:pointer}
#panel{position:fixed;bottom:-100%;left:0;width:100%;height:85vh;background:#fffefeee;border-radius:25px 25px 0 0;box-shadow:0 -6px 20px #0003;padding:20px;overflow-y:auto;transition:.4s;z-index:999}
.flag{font-size:30px;margin-right:8px}
.title{font-size:26px;font-weight:600;color:#3b2f63}
.country{font-size:14px;color:#7a6a9a}
img{width:100%;border-radius:16px;margin:15px 0}
.tag{background:#f4f1ff;padding:4px 10px;border-radius:999px;font-size:12px;margin:3px;display:inline-block}
.sec{font-weight:600;margin-top:12px;color:#4a3b6b}
.box{background:#f4f1ff;padding:10px;border-radius:12px;font-size:14px;margin-bottom:8px}
.btn{width:100%;padding:12px;border:none;border-radius:14px;font-size:16px;font-weight:600;margin-top:10px;cursor:pointer}
.map{background:#bcd6ff;color:#23406b}
.bucket{background:#e3c9ff;color:#4a3b6b}
.close{float:right;font-size:26px;color:#ff5c8a;background:none;border:none;cursor:pointer}
</style>
</head>
<body>

<div class="home" onclick="location.href='index.html'">🏠</div>
<h1>City Explorer</h1>
<input id="search" placeholder="Search for a city…">
<div id="list"></div>
<div id="panel"></div>
 <script>
/*  
CITY DATA WILL BE INSERTED INSIDE THIS OBJECT  
*/
const CITY_DATA = {

    /* <-- paste all your cities here later */

};

/* parse compressed city string */
function parseCity(str){
  const [flag,country,cats,sights,food,fun,photos,relax,culture,outfit,hair,weather,maps,transport,durations] = str.split("|");
  return {
    flag,
    country,
    categories: cats.split(","),
    sights: sights.split(";"),
    food: food.split(";"),
    fun: fun.split(";"),
    photos: photos.split(";"),
    relax: relax.split(";"),
    culture,
    outfit: outfit.split(";"),
    hair: hair.split(";"),
    weather,
    maps,
    transport: transport.split(";"),
    durations: durations.split(";")
  };
}

/* expand all cities */
const C = {};
Object.keys(CITY_DATA).forEach(n => C[n] = parseCity(CITY_DATA[n]));

/* render list */
function render(f=""){
  const L = document.getElementById("list");
  L.innerHTML = "";
  f = f.toLowerCase();
  Object.keys(C)
    .sort()
    .filter(n => n.toLowerCase().includes(f) || C[n].country.toLowerCase().includes(f))
    .forEach(n => {
      const c = C[n];
      L.innerHTML += `
        <div class="city" onclick="openCity('${n.replace(/'/g,"\\'")}')">
          <span>${c.flag} ${n}</span>
          <small>${c.country}</small>
        </div>`;
    });
}
render();

/* search */
document.getElementById("search").oninput = e => render(e.target.value);

/* open panel */
function openCity(name){
  const c = C[name];
  const p = document.getElementById("panel");
  const transportRows = c.transport.map((t,i) => `${t}: ${c.durations[i] || ""}`).join(" • ");

  p.innerHTML = `
    <button class="close" onclick="closeP()">✖</button>
    <div class="title">${c.flag} ${name}</div>
    <div class="country">${c.country}</div>
    <img src="https://source.unsplash.com/800x500/?${encodeURIComponent(name)}">
    ${c.categories.map(t => `<span class="tag">${t}</span>`).join("")}
    <div class="sec">Weather vibe</div><div class="box">${c.weather}</div>
    <div class="sec">Best sights</div><div class="box">${c.sights.join(", ")}</div>
    <div class="sec">Best food</div><div class="box">${c.food.join(", ")}</div>
    <div class="sec">Fun things</div><div class="box">${c.fun.join(", ")}</div>
    <div class="sec">Photo spots</div><div class="box">${c.photos.join(", ")}</div>
    <div class="sec">Relax spots</div><div class="box">${c.relax.join(", ")}</div>
    <div class="sec">Culture</div><div class="box">${c.culture}</div>
    <div class="sec">Outfit ideas</div><div class="box">${c.outfit.join(", ")}</div>
    <div class="sec">Hairstyle ideas</div><div class="box">${c.hair.join(", ")}</div>
    <div class="sec">How to get there</div><div class="box">${transportRows}</div>
    <button class="btn map" onclick="openMap('${encodeURIComponent(c.maps)}')">🗺 Open in Maps</button>
    <button class="btn bucket" onclick="addBucket('${name.replace(/'/g,"\\'")}')">⭐ Add to Bucket List</button>
  `;
  p.style.bottom = "0";
}

function closeP(){
  document.getElementById("panel").style.bottom = "-100%";
}

function openMap(q){
  open("https://www.google.com/maps/search/?api=1&query=" + q);
}

function addBucket(n){
  let b = JSON.parse(localStorage.getItem("bucketList") || "[]");
  b.push({ text: "🌍 " + n, checked: false });
  localStorage.setItem("bucketList", JSON.stringify(b));
  alert(n + " added!");
}
