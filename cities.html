<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sky Atlas — City Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins;background:linear-gradient(#c7c4ff,#e6e4ff);padding:20px;min-height:100vh}
.home{position:fixed;top:15px;left:15px;background:#e3c9ff;padding:12px;border-radius:50%;font-size:22px;cursor:pointer;z-index:99}
h1{text-align:center;margin-top:60px;font-size:46px;font-family:'Great Vibes';color:#3b2f63}
input{width:100%;padding:14px;border:none;border-radius:14px;font-size:17px;box-shadow:0 4px 12px #0002;margin:20px auto;max-width:600px;display:block}
#list{max-width:600px;margin:0 auto}
.city{width:100%;padding:14px;margin-bottom:10px;border:none;border-radius:14px;background:#dcd7ff;font-size:17px;display:flex;justify-content:space-between;cursor:pointer}
#panel{position:fixed;bottom:-100%;left:0;width:100%;height:85vh;background:#fffefeee;border-radius:25px 25px 0 0;box-shadow:0 -6px 20px #0003;padding:20px;overflow-y:auto;transition:.4s;z-index:999}
.flag{font-size:30px;margin-right:8px}
.title{font-size:26px;font-weight:600;color:#3b2f63}
.country{font-size:14px;color:#7a6a9a}
img{width:100%;border-radius:16px;margin:15px 0}
.tag{background:#f4f1ff;padding:4px 10px;border-radius:999px;font-size:12px;margin:3px;display:inline-block}
.sec{font-weight:600;margin-top:12px;color:#4a3b6b}
.box{background:#f4f1ff;padding:10px;border-radius:12px;font-size:14px;margin-bottom:8px}
.btn{width:100%;padding:12px;border:none;border-radius:14px;font-size:16px;font-weight:600;margin-top:10px;cursor:pointer}
.map{background:#bcd6ff;color:#23406b}
.bucket{background:#e3c9ff;color:#4a3b6b}
.close{float:right;font-size:26px;color:#ff5c8a;background:none;border:none;cursor:pointer}
</style>
</head>
<body>

<div class="home" onclick="location.href='index.html'">🏠</div>
<h1>City Explorer</h1>
<input id="search" placeholder="Search for a city…">
<div id="list"></div>
<div id="panel"></div>

<script>
/*
ULTRA-SHRUNK FORMAT (one line per city):
"name":"FLAG|Country|cat1,cat2|sight1;sight2;sight3;sight4|food1;food2;food3;food4|fun1;fun2;fun3;fun4|photo1;photo2;photo3;photo4|relax1;relax2;relax3;relax4|culture summary|outfit1;outfit2;outfit3;outfit4|hair1;hair2;hair3|weather vibe|maps query"
Add as many cities as you want here, alphabetically.
*/
const CITY_DATA={
"Amsterdam":"🇳🇱|Netherlands|Cozy,Canals|Canal belt;Anne Frank House;Rijksmuseum;Jordaan|Stroopwafels;Fries with sauces;Pancakes;Local cafés|Canal cruises;Biking;Markets;Vintage shops|Canal bridges;Narrow houses;Flower markets;Jordaan streets|Vondelpark;Canal-side cafés;Parks;Waterfront benches|Amsterdam feels chill and creative, with bikes, canals, and a relaxed café culture.|Sweater;Trench coat;Straight jeans;Sneakers|Low bun;Ponytail;Natural hair|Cool and often rainy—layers and a light coat.|Amsterdam, Netherlands",
"Barcelona":"🇪🇸|Spain|Beachy,Artistic|Sagrada Família;Park Güell;Gothic Quarter;Casa Batlló|Tapas;Paella;Churros;Seafood|Beachfront bars;Nightlife;Street performers;Markets|Park Güell views;Barceloneta;Gothic alleys;Rooftops|Ciutadella Park;Beach promenades;Cafés;Plazas|Barcelona is sunny and artistic, mixing Gaudí architecture with relaxed Mediterranean life.|Flowy dress;Linen pants;Sandals;Straw bag|Beach waves;Half-up;Loose curls|Warm Mediterranean weather—light, breathable outfits.|Barcelona, Spain",
"Berlin":"🇩🇪|Germany|Urban,Nightlife|Brandenburg Gate;East Side Gallery;Museum Island;TV Tower|Street food;Currywurst;Bakeries;Cafés|Techno clubs;Bars;Street art tours;Markets|East Side Gallery;Rooftops;Spree river;Street murals|Tiergarten;Parks;Riverside walks;Cafés|Berlin feels edgy and creative, with history, art, and a big alternative scene.|Black jeans;Oversized jacket;Boots;Graphic tee|Sleek hair;Messy bun;Beanie hair|Cold winters, mild summers—layered streetwear works well.|Berlin, Germany",
"Kyoto":"🇯🇵|Japan|Traditional,Calm|Fushimi Inari;Kiyomizu-dera;Arashiyama;Gion|Matcha sweets;Kaiseki;Tofu dishes;Tea houses|Kimono rentals;Tea ceremonies;Temple walks;Markets|Torii gates;Bamboo forest;Old streets;Riverside|Temple gardens;Riverside paths;Quiet shrines;Parks|Kyoto is peaceful and traditional, full of temples, gardens, and seasonal beauty.|Soft neutrals;Flowy pants;Simple tops;Comfortable shoes|Low bun;Braids;Straight hair|Four seasons—dress for spring blossoms and autumn leaves.|Kyoto, Japan",
"Lisbon":"🇵🇹|Portugal|Sunny,Coastal|Belém Tower;Alfama;Tram 28;Miradouros|Pastéis de nata;Seafood;Bacalhau;Cafés|Tram rides;Fado music;Rooftop bars;Markets|Tile streets;Viewpoints;Yellow trams;Riverside|Cascais beaches;Riverside walks;Parks;Cafés|Lisbon is warm and musical, shaped by seafaring history and sunny coastal life.|Linen dress;Light pants;Comfy shoes;Sunglasses|Windproof ponytail;Loose waves;Half-up|Mild, sunny climate—perfect for light layers.|Lisbon, Portugal",
"London":"🇬🇧|United Kingdom|Historic,Cozy|Big Ben;Tower Bridge;British Museum;Buckingham Palace|Fish & chips;Sunday roast;Tea;Pastries|West End shows;Markets;Pubs;Shopping|Notting Hill;Sky Garden;South Bank;Streetscapes|Hyde Park;Regent's Park;Greenwich;Cafés|London mixes royal history with modern diversity and cozy rainy-day vibes.|Long coat;Scarf;Knit sweater;Chelsea boots|Messy bun;Low pony;Loose waves|Mild and rainy—layers and a good coat are essential.|London, United Kingdom",
"New York":"🇺🇸|USA|Urban,Iconic|Times Square;Central Park;Brooklyn Bridge;Statue of Liberty (view)|Bagels;Pizza;Food trucks;Chinatown eats|Broadway;SoHo shopping;Rooftop bars;Museums|DUMBO;Top of the Rock;Central Park;Street corners|Bryant Park;Hudson River Park;Central Park lawns;Cafés|New York is fast, loud, and ambitious, with energy at every hour.|Black jeans;Leather jacket;Chunky sneakers;Crossbody bag|High ponytail;Slick bun;Big waves|Cold winters, hot summers—dress for extremes.|New York City, USA",
"Paris":"🇫🇷|France|Romantic,Aesthetic|Eiffel Tower;Louvre;Montmartre;Seine riverbanks|Croissants;Macarons;Bistros;Wine bars|Seine cruises;Vintage shopping;Cabaret;Cafés|Trocadéro;Pont Alexandre III;Rue Crémieux;Louvre pyramids|Luxembourg Gardens;Tuileries;Canal Saint-Martin;Île Saint-Louis|Paris blends art, fashion, and café culture with a relaxed, romantic rhythm.|Beige trench;Black turtleneck;Straight jeans;Mini bag|Loose waves;Low bun;Sleek ponytail|Mild climate—layering with chic outerwear works best.|Paris, France",
"Prague":"🇨🇿|Czechia|Fairytale,Cozy|Charles Bridge;Prague Castle;Old Town Square;Astronomical Clock|Goulash;Trdelník;Local beer;Cafés|River cruises;Old town walks;Jazz bars;Markets|Charles Bridge sunrise;Castle views;Old streets;Riverside|Parks;Cafés;Riverside benches;Gardens|Prague feels like a fairytale city with medieval charm and cozy café culture.|Coat;Scarf;Boots;Warm layers|Loose hair;Beanie;Low pony|Cold winters, warm summers—classic European seasons.|Prague, Czech Republic",
"Rome":"🇮🇹|Italy|Historic,Romantic|Colosseum;Trevi Fountain;Vatican;Piazza Navona|Pasta;Gelato;Espresso;Pizza|Evening walks;Piazzas;Markets;Wine bars|Trevi;Spanish Steps;Streets;Views|Villa Borghese;Cafés;Parks;Terraces|Rome is ancient and lively, with ruins, piazzas, and long, social meals.|Midi skirt;Tailored pants;Simple top;Chic sandals|Soft curls;Low bun;Pinned waves|Warm and sunny much of the year.|Rome, Italy",
"Seoul":"🇰🇷|South Korea|Trendy,Nightlife|Gyeongbokgung;Bukchon;N Seoul Tower;Myeongdong|Korean BBQ;Tteokbokki;Hotteok;Cafés|Hongdae nightlife;K-pop shops;Photo cafés;Markets|Bukchon rooftops;Cheonggyecheon;Hongdae streets;City views|Hangang parks;Seoul Forest;Cafés;Riverside|Seoul is stylish and fast-paced, rooted in food, community, and modern pop culture.|Pastel cardigan;Tennis skirt;Straight jeans;White sneakers|Korean waves;Half-up;Low pony with bangs|Cold winters, hot summers—layered street style.|Seoul, South Korea",
"Sydney":"🇦🇺|Australia|Beach,Urban|Opera House;Harbour Bridge;Bondi Beach;Manly|Brunch;Seafood;Flat white;Burgers|Coastal walks;Surfing;Harbour cruises;Bars|Bondi Icebergs;Harbour views;Beaches;Skyline|Beaches;Parks;Harbourfront;Cafés|Sydney is laid-back and outdoorsy, centered around beaches and harbour life.|Shorts;Sundress;Light shirts;Sandals|Beach waves;Ponytail;Messy bun|Mild winters, warm sunny summers.|Sydney, Australia"
};

/* expand compressed data */
function parseCity(str){
  const [flag,country,cats,sights,food,fun,photos,relax,culture,outfit,hair,weather,maps]=str.split("|");
  return {
    flag,
    country,
    categories:cats.split(","),
    sights:sights.split(";"),
    food:food.split(";"),
    fun:fun.split(";"),
    photos:photos.split(";"),
    relax:relax.split(";"),
    culture,
    outfit:outfit.split(";"),
    hair:hair.split(";"),
    weather,
    maps
  };
}

/* build expanded object */
const C={};
Object.keys(CITY_DATA).forEach(name=>C[name]=parseCity(CITY_DATA[name]));

/* render list alphabetically */
function render(filter=""){
  const L=document.getElementById("list");
  L.innerHTML="";
  filter=filter.toLowerCase();
  Object.keys(C).sort().filter(n=>n.toLowerCase().includes(filter)||C[n].country.toLowerCase().includes(filter))
  .forEach(n=>{
    const c=C[n];
    L.innerHTML+=`<div class="city" onclick="openCity('${n.replace(/'/g,"\\'")}')"><span>${c.flag} ${n}</span><small>${c.country}</small></div>`;
  });
}
render();

/* search */
document.getElementById("search").oninput=e=>render(e.target.value);

/* open panel */
function openCity(name){
  const c=C[name],p=document.getElementById("panel");
  p.innerHTML=`
  <button class="close" onclick="closeP()">✖</button>
  <div class="title">${c.flag} ${name}</div>
  <div class="country">${c.country}</div>
  <img src="https://source.unsplash.com/800x500/?${encodeURIComponent(name)}">
  ${c.categories.map(t=>`<span class="tag">${t}</span>`).join("")}
  <div class="sec">Weather vibe</div><div class="box">${c.weather}</div>
  <div class="sec">Best sights</div><div class="box">${c.sights.join(", ")}</div>
  <div class="sec">Best food</div><div class="box">${c.food.join(", ")}</div>
  <div class="sec">Fun things</div><div class="box">${c.fun.join(", ")}</div>
  <div class="sec">Photo spots</div><div class="box">${c.photos.join(", ")}</div>
  <div class="sec">Relax spots</div><div class="box">${c.relax.join(", ")}</div>
  <div class="sec">Culture</div><div class="box">${c.culture}</div>
  <div class="sec">Outfit ideas</div><div class="box">${c.outfit.join(", ")}</div>
  <div class="sec">Hairstyle ideas</div><div class="box">${c.hair.join(", ")}</div>
  <button class="btn map" onclick="openMap('${encodeURIComponent(c.maps)}')">🗺 Open in Maps</button>
  <button class="btn bucket" onclick="addBucket('${name.replace(/'/g,"\\'")}')">⭐ Add to Bucket List</button>`;
  p.style.bottom="0";
}
function closeP(){document.getElementById("panel").style.bottom="-100%"}
function openMap(q){open("https://www.google.com/maps/search/?api=1&query="+q)}
function addBucket(n){
  let b=JSON.parse(localStorage.getItem("bucketList")||"[]");
  b.push({text:"🌍 "+n,checked:false});
  localStorage.setItem("bucketList",JSON.stringify(b));
  alert(n+" added!");
}
</script>
</body>
</html>
