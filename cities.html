<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sky Atlas — City Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins;background:linear-gradient(#c7c4ff,#e6e4ff);padding:20px;min-height:100vh}
.home{position:fixed;top:15px;left:15px;background:#e3c9ff;padding:12px;border-radius:50%;font-size:22px;cursor:pointer;z-index:99}
h1{text-align:center;margin-top:60px;font-size:46px;font-family:'Great Vibes';color:#3b2f63}
input{width:100%;padding:14px;border:none;border-radius:14px;font-size:17px;box-shadow:0 4px 12px #0002;margin:20px auto;max-width:600px;display:block}
#list{max-width:600px;margin:0 auto}
.city{width:100%;padding:14px;margin-bottom:10px;border:none;border-radius:14px;background:#dcd7ff;font-size:17px;display:flex;justify-content:space-between;cursor:pointer}
#panel{position:fixed;bottom:-100%;left:0;width:100%;height:85vh;background:#fffefeee;border-radius:25px 25px 0 0;box-shadow:0 -6px 20px #0003;padding:20px;overflow-y:auto;transition:.4s;z-index:999}
.flag{font-size:30px;margin-right:8px}
.title{font-size:26px;font-weight:600;color:#3b2f63}
.country{font-size:14px;color:#7a6a9a}
img{width:100%;border-radius:16px;margin:15px 0}
.tag{background:#f4f1ff;padding:4px 10px;border-radius:999px;font-size:12px;margin:3px;display:inline-block}
.sec{font-weight:600;margin-top:12px;color:#4a3b6b}
.box{background:#f4f1ff;padding:10px;border-radius:12px;font-size:14px;margin-bottom:8px}
.btn{width:100%;padding:12px;border:none;border-radius:14px;font-size:16px;font-weight:600;margin-top:10px;cursor:pointer}
.map{background:#bcd6ff;color:#23406b}
.bucket{background:#e3c9ff;color:#4a3b6b}
.close{float:right;font-size:26px;color:#ff5c8a;background:none;border:none;cursor:pointer}
</style>
</head>
<body>

<div class="home" onclick="location.href='index.html'">🏠</div>
<h1>City Explorer</h1>
<input id="search" placeholder="Search for a city…">
<div id="list"></div>
<div id="panel"></div>
