<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>City Explorer</title>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
#search {width:90%; margin:20px auto; display:block; padding:12px; font-size:18px;}
#list {padding:20px;}
.city {background:white; padding:15px; margin-bottom:10px; border-radius:8px; cursor:pointer; display:flex; justify-content:space-between;}
.city:hover {background:#eee;}
#panel {position:fixed; bottom:-100%; left:0; width:100%; height:90%; background:white; border-radius:20px 20px 0 0; padding:20px; overflow-y:auto; transition:0.4s;}
.close {float:right; font-size:22px; background:none; border:none; cursor:pointer;}
.title {font-size:28px; font-weight:bold;}
.country {color:#777; margin-bottom:10px;}
img {width:100%; border-radius:10px; margin:15px 0;}
.tag {background:#222; color:white; padding:5px 10px; border-radius:20px; margin-right:5px; display:inline-block; margin-top:10px;}
.sec {margin-top:20px; font-weight:bold;}
.box {background:#f0f0f0; padding:10px; border-radius:8px; margin-top:5px;}
.btn {width:100%; padding:15px; margin-top:15px; border:none; border-radius:10px; font-size:18px; cursor:pointer;}
.map {background:#0078ff; color:white;}
.bucket {background:#ffcc00;}
</style>
</head>
<body>

<input id="search" placeholder="Search cities...">
<div id="list"></div>

<div id="panel"></div>

// ------------------ SCRIPT LOGIC ------------------

function parseCity(str){
  const [flag,country,cats,sights,food,fun,photos,relax,culture,outfit,hair,weather,maps,transport,durations] = str.split("|");
  return {
    flag,
    country,
    categories: cats.split(","),
    sights: sights.split(";"),
    food: food.split(";"),
    fun: fun.split(";"),
    photos: photos.split(";"),
    relax: relax.split(";"),
    culture,
    outfit: outfit.split(";"),
    hair: hair.split(";"),
    weather,
    maps,
    transport: transport.split(";"),
    durations: durations.split(";")
  };
}

const C = {};
Object.keys(CITY_DATA).forEach(n => C[n] = parseCity(CITY_DATA[n]));

function render(f=""){
  const L = document.getElementById("list");
  L.innerHTML = "";
  f = f.toLowerCase();
  Object.keys(C)
    .sort()
    .filter(n => n.toLowerCase().includes(f) || C[n].country.toLowerCase().includes(f))
    .forEach(n => {
      const c = C[n];
      L.innerHTML += `
        <div class="city" onclick="openCity('${n.replace(/'/g,"\\'")}')">
          <span>${c.flag} ${n}</span>
          <small>${c.country}</small>
        </div>`;
    });
}
render();

document.getElementById("search").oninput = e => render(e.target.value);

function openCity(name){
  const c = C[name];
  const p = document.getElementById("panel");
  const transportRows = c.transport.map((t,i)=>`${t}: ${c.durations[i]||""}`).join(" • ");

  p.innerHTML = `
    <button class="close" onclick="closeP()">✖</button>
    <div class="title">${c.flag} ${name}</div>
    <div class="country">${c.country}</div>
    <img src="https://source.unsplash.com/800x500/?${encodeURIComponent(name)}">
    ${c.categories.map(t=>`<span class="tag">${t}</span>`).join("")}
    <div class="sec">Weather</div><div class="box">${c.weather}</div>
    <div class="sec">Sights</div><div class="box">${c.sights.join(", ")}</div>
    <div class="sec">Food</div><div class="box">${c.food.join(", ")}</div>
    <div class="sec">Fun</div><div class="box">${c.fun.join(", ")}</div>
    <div class="sec">Photos</div><div class="box">${c.photos.join(", ")}</div>
    <div class="sec">Relax</div><div class="box">${c.relax.join(", ")}</div>
    <div class="sec">Culture</div><div class="box">${c.culture}</div>
    <div class="sec">Outfit</div><div class="box">${c.outfit.join(", ")}</div>
    <div class="sec">Hair</div><div class="box">${c.hair.join(", ")}</div>
    <div class="sec">Transport</div><div class="box">${transportRows}</div>
    <button class="btn map" onclick="openMap('${encodeURIComponent(c.maps)}')">🗺 Open in Maps</button>
    <button class="btn bucket" onclick="addBucket('${name.replace(/'/g,"\\'")}')">⭐ Add to Bucket List</button>
  `;
  p.style.bottom = "0";
}

function closeP(){ document.getElementById("panel").style.bottom="-100%"; }
function openMap(q){ open("https://www.google.com/maps/search/?api=1&query="+q); }

function addBucket(n){
  let b = JSON.parse(localStorage.getItem("bucketList")||"[]");
  b.push({text:"🌍 "+n,checked:false});
  localStorage.setItem("bucketList",JSON.stringify(b));
  alert(n+" added!");
}
</script>
