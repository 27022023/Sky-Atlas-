<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Search Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;width:100vw;height:100vh;overflow:hidden}
#map{position:absolute;top:60px;left:0;width:100vw;height:calc(100vh - 200px)}
.top-bar{position:absolute;top:10px;left:10px;right:10px;display:flex;gap:8px;z-index:1000}
.top-bar input{flex:1;padding:8px 10px;font-size:14px}
.top-bar button{padding:8px 14px;font-size:14px;cursor:pointer}
#results{position:absolute;left:0;right:0;bottom:0;max-height:140px;overflow-y:auto;background:#fff;border-top:1px solid #ccc;padding:8px 10px;font-size:14px;z-index:1000}
.result-item{padding:6px 4px;border-bottom:1px solid #eee;cursor:pointer}
.result-item:hover{background:#f3f3f3}
.result-title{font-weight:bold}
.result-sub{font-size:12px;color:#666}
</style>
</head>
<body>

<div class="top-bar">
  <input id="searchInput" type="text" placeholder="Search any place: city, café, address…">
  <button id="searchBtn">Search</button>
</div>

<div id="map"></div>
<div id="results"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let map, userMarker, resultsDiv = document.getElementById('results');
let markers = [];

function initMap(lat, lon){
  map = L.map('map').setView([lat, lon], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  userMarker = L.marker([lat, lon]).addTo(map).bindPopup("You are here");
  map.on('click', onMapClick);
}

function onMapClick(e){
  const {lat, lng} = e.latlng;
  const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  L.popup()
    .setLatLng(e.latlng)
    .setContent(
      `<b>Selected point</b><br>Lat: ${lat.toFixed(5)}, Lon: ${lng.toFixed(5)}<br>
       <a href="${url}" target="_blank">Get directions</a>`
    )
    .openOn(map);
}

function clearSearchMarkers(){
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

async function searchPlaces(){
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  resultsDiv.innerHTML = "Searching…";
  clearSearchMarkers();

  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&addressdetails=1&limit=10`;
  const res = await fetch(url, {headers:{'Accept-Language':'en'}});
  const data = await res.json();

  if(!data.length){
    resultsDiv.innerHTML = "<p>No results found.</p>";
    return;
  }

  resultsDiv.innerHTML = "";
  data.forEach((item, idx) => {
    const lat = parseFloat(item.lat);
    const lon = parseFloat(item.lon);
    const name = item.display_name || "Unnamed place";

    const marker = L.marker([lat, lon]).addTo(map);
    marker.bindPopup(
      `<b>${name}</b><br>
       <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}" target="_blank">
       Get directions</a>`
    );
    markers.push(marker);

    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `<div class="result-title">${item.display_name.split(',')[0]}</div>
                     <div class="result-sub">${item.display_name}</div>`;
    div.onclick = () => {
      map.setView([lat, lon], 15);
      marker.openPopup();
    };
    resultsDiv.appendChild(div);

    if(idx === 0){
      map.setView([lat, lon], 14);
    }
  });
}

document.getElementById('searchBtn').onclick = searchPlaces;
document.getElementById('searchInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') searchPlaces();
});

if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos => initMap(pos.coords.latitude, pos.coords.longitude),
    () => initMap(48.1374, 11.5755) // fallback: Munich
  );
} else {
  initMap(48.1374, 11.5755);
}
</script>
</body>
</html>
